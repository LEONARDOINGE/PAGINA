type Mutation {
  login(email: String!, password: String!): AuthPayload!

  createClient(input: ClientInput!): Client!
  updateClient(id: ID!, input: ClientInput!): Client!
  deleteClient(id: ID!): Client!
  convertLead(id: ID!, assignedTo: ID): Client!

  createQuote(input: QuoteInput!): Quote!
  updateQuote(id: ID!, input: QuoteInput!): Quote!
  deleteQuote(id: ID!): Quote!
  convertQuoteToInvoice(quoteId: ID!): Invoice!

  createInvoice(input: InvoiceInput!): Invoice!
  updateInvoice(id: ID!, status: InvoiceStatus): Invoice!
  registerPayment(invoiceId: ID!, amount: Float!, method: String): Payment!

  createSupplier(input: SupplierInput!): Supplier!
  updateSupplier(id: ID!, input: SupplierInput!): Supplier!
  deleteSupplier(id: ID!): Supplier!

  createProduct(input: ProductInput!): Product!
  updateProduct(id: ID!, input: ProductInput!): Product!
  deleteProduct(id: ID!): Product!
  adjustStock(productId: ID!, quantity: Int!, type: StockMovementType!, reason: String): StockMovement!

  createPurchaseOrder(input: POInput!): PurchaseOrder!
  updatePurchaseOrderStatus(id: ID!, status: POStatus!): PurchaseOrder!
  receivePurchaseOrder(id: ID!): PurchaseOrder!

  createDepartment(name: String!, code: String!, color: String): Department!
  updateDepartment(id: ID!, name: String, color: String): Department!
  createPosition(departmentId: ID!, name: String!, level: String, minSalary: Float, maxSalary: Float): Position!

  createEmployee(input: EmployeeInput!): Employee!
  updateEmployee(id: ID!, input: EmployeeInput!): Employee!
  deactivateEmployee(id: ID!): Employee!

  clockIn(employeeId: ID!): Attendance!
  clockOut(employeeId: ID!): Attendance!
  recordAttendance(employeeId: ID!, input: AttendanceInput!): Attendance!
  requestLeave(input: LeaveInput!): Leave!
  approveLeave(id: ID!): Leave!
  rejectLeave(id: ID!): Leave!

  createTraining(name: String!, description: String, instructor: String, durationHours: Int, type: String): Training!
  enrollTraining(employeeId: ID!, trainingId: ID!): TrainingEnrollment!
  completeTraining(enrollmentId: ID!, score: Float): TrainingEnrollment!

  createTicket(clientId: ID, subject: String!, description: String, priority: TicketPriority, category: String): Ticket!
  updateTicket(id: ID!, status: TicketStatus, assignedTo: ID, priority: TicketPriority): Ticket!

  addNote(entityType: String!, entityId: ID!, content: String!, pinned: Boolean, private: Boolean): Note!
  logActivity(entityType: String, entityId: ID, type: String!, description: String!, dueDate: Date, assignedTo: ID): Activity!
  completeActivity(id: ID!): Activity!
  scheduleAppointment(clientId: ID, title: String!, type: String, date: Date!, time: String!, duration: Int, location: String): Appointment!
  updateAppointment(id: ID!, status: String): Appointment!

  createCampaign(name: String!, type: String!, channel: String, budget: Float): Campaign!
  updateCampaign(id: ID!, status: String): Campaign!
  sendCampaign(campaignId: ID!): Campaign!

  createSurvey(clientId: ID!, appointmentId: ID, type: String, score: Int, feedback: String): Survey!

  createUser(input: UserInput!): User!
  updateUser(id: ID!, name: String, email: String, password: String, role: UserRole): User!
  deleteUser(id: ID!): User!
  assignRole(userId: ID!, role: UserRole!): User!

  createNotification(input: NotificationInput!): Notification!
  markNotificationRead(id: ID!): Notification!
  markAllNotificationsRead: Boolean!

  exportReport(format: String!, type: String!): String!
  syncToTurso: Boolean!
  pullFromTurso: Boolean!
}

type Query {
  me: User
  users: [User!]!
  user(id: ID!): User
  roles: [Role!]!

  erpDashboard: ERPDashboard!

  clients(page: Int, perPage: Int, search: String, segment: String): PaginatedClients!
  client(id: ID!): Client
  leads(search: String, stage: LeadStage): [Lead!]!
  lead(id: ID!): Lead
  quotes(clientId: ID): [Quote!]!
  quote(id: ID!): Quote
  invoices(clientId: ID, status: InvoiceStatus): [Invoice!]!
  invoice(id: ID!): Invoice

  suppliers(search: String): [Supplier!]!
  supplier(id: ID!): Supplier
  products(search: String, categoryId: ID, lowStock: Boolean): [Product!]!
  product(id: ID!): Product
  categories: [Category!]!
  warehouses: [Warehouse!]!
  inventory(warehouseId: ID): [Inventory!]!
  stockMovements(productId: ID, limit: Int): [StockMovement!]!
  purchaseOrders(supplierId: ID, status: POStatus): [PurchaseOrder!]!
  purchaseOrder(id: ID!): PurchaseOrder

  employees(page: Int, perPage: Int, search: String, departmentId: ID, active: Boolean): PaginatedEmployees!
  employee(id: ID!): Employee
  departments: [Department!]!
  positions(departmentId: ID): [Position!]!
  attendance(date: Date, employeeId: ID, month: Int, year: Int): [Attendance!]!
  leaves(status: LeaveStatus, employeeId: ID): [Leave!]!
  trainings: [Training!]!
  reviews(employeeId: ID): [Review!]!
  orgChart: [Department!]!

  appointments(date: Date, from: Date, to: Date): [Appointment!]!
  appointment(id: ID!): Appointment
  tickets(status: TicketStatus, priority: TicketPriority): [Ticket!]!
  ticket(id: ID!): Ticket
  campaigns(status: String): [Campaign!]!
  surveys(type: String): [Survey!]!

  activities(entityType: String, entityId: ID, pending: Boolean): [Activity!]!
  notes(entityType: String, entityId: ID): [Note!]!

  notifications(unreadOnly: Boolean): [Notification!]!
  notificationCount: Int!
  auditLogs(entityType: String, limit: Int): [AuditLog!]!
  globalSearch(query: String!): [SearchResult!]!
}

union SearchResult = Client | Lead | Quote | Invoice | Product | Supplier | Employee | Ticket | Appointment
