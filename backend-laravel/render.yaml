database:
  name: fototec-db
  databaseName: fototec_app
  plan: free
  postgresMajorVersion: "17"

services:
  - type: web
    name: fototec-api
    runtime: php
    region: oregon
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
    preDeployCommand: |
      php artisan migrate --force
      php artisan db:seed --class=DatabaseSeeder --force || true
    startCommand: "php -S 0.0.0.0:$PORT -t public"
    healthCheckPath: /graphql
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://fototec-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: fototec-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: fototec-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: fototec-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: fototec-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fototec-db
          property: password
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://fototec-web.onrender.com
      - key: CACHE_DRIVER
        value: array
      - key: SESSION_DRIVER
        value: array
      - key: LOG_CHANNEL
        value: stderr
